[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -I src
lib_deps =
    mathieucarbou/ESPAsyncWebServer
    mathieucarbou/AsyncTCP
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    olikraus/U8g2_for_Adafruit_GFX
